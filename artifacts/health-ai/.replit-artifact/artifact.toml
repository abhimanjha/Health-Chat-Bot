kind = "mobile"
previewPath = "/"
title = "HealthAI - Mental Health Chatbot"
version = "1.0.0"
id = "artifacts/health-ai"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20530

[services.development]
run = "pnpm --filter @workspace/health-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/health-ai", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/health-ai", "run", "serve" ]

[services.env]
PORT = "20530"
BASE_PATH = "/"
